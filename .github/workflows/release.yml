name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build hn_cli
        working-directory: hn_cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mv hn_cli/target/${{ matrix.target }}/release/hn_cli hn_cli/target/${{ matrix.target }}/release/hackernews-linux

      - name: Rename binary (macOS)
        if: matrix.os == 'macos-latest'
        run: mv hn_cli/target/${{ matrix.target }}/release/hn_cli hn_cli/target/${{ matrix.target }}/release/hackernews-mac

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: mv hn_cli/target/${{ matrix.target }}/release/hn_cli.exe hn_cli/target/${{ matrix.target }}/release/hackernews-windows.exe

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: hn_cli/target/${{ matrix.target }}/release/hackernews-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}